services:
  db:
    image: pgvector/pgvector:pg16
    container_name: prompt_master_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promptmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-promptmaster}
      POSTGRES_DB: ${POSTGRES_DB:-promptmaster}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promptmaster}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prompt_master_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-promptmaster}:${POSTGRES_PASSWORD:-promptmaster}@db:5432/${POSTGRES_DB:-promptmaster}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
