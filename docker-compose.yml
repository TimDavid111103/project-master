services:
  db:
    image: timescale/pgvectorscale-docker:pg16-latest
    container_name: prompt_master_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promptmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-promptmaster}
      POSTGRES_DB: ${POSTGRES_DB:-promptmaster}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promptmaster}"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  pgdata:
